version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: neuroassist-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NCBI_API_KEY=${NCBI_API_KEY}
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - PAPERS_COLLECTION=${PAPERS_COLLECTION}
      - CODE_COLLECTION=${CODE_COLLECTION}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - LLM_MODEL=${LLM_MODEL}
    volumes:
      # Persist ChromaDB and knowledge graph between container restarts
      - ./data/chroma_db:/app/data/chroma_db
      - ./data/knowledge_graph.pkl:/app/data/knowledge_graph.pkl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: neuroassist-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
